name: Publish Package to GitHub Packages & npm

on:
  push:
    branches:
      - master
  # Allow manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push tags and create releases
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so release notes can reference prior tags

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        # Ignore scripts to prevent the 'prepare' script from triggering a redundant build
        run: bun install --ignore-scripts

      - name: Build project
        if: steps.tag_check.outputs.exists == 'false'
        run: bun run build

      # ── GitHub Packages ────────────────────────────────────────────
      - name: Setup .npmrc for GitHub Packages
        if: steps.tag_check.outputs.exists == 'false'
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc

      - name: Publish to GitHub Packages
        if: steps.tag_check.outputs.exists == 'false'
        # Ignore scripts to prevent the 'prepare' script from triggering a redundant build before publish
        run: npm publish --ignore-scripts

      # ── npm Registry ───────────────────────────────────────────────
      - name: Setup .npmrc for npm
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false'
        # Ignore scripts to prevent the 'prepare' script from triggering a redundant build before publish
        run: npm publish --registry=https://registry.npmjs.org/ --access public --ignore-scripts

      # ── Release ────────────────────────────────────────────────────
      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
